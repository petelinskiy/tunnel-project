version: '3.8'

services:
  tunnel-client:
    build:
      context: ..
      dockerfile: client/Dockerfile
    container_name: tunnel-client
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "1080:1080"
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./configs/client.yml:/app/configs/client.yml
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
