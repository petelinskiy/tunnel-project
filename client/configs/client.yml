client:
  web_ui_port: 8080
  socks5_port: 1080
  data_dir: /app/data

tunnel:
  obfuscation_key: "b29406e1cf214e2ebdb8ac0e6a54b11a"
  jitter_max_ms: 500   # случайная задержка 0–500ms перед каждым подключением
  sni_list:            # SNI подставляется случайно из списка (маскировка под реальные домены)
    - "www.google.com"
    - "www.youtube.com"
    - "www.cloudflare.com"
    - "cdn.jsdelivr.net"
    - "ajax.googleapis.com"
    - "fonts.googleapis.com"
    - "www.gstatic.com"
    - "storage.googleapis.com"

balancing:
  strategy: latency  # round-robin, latency, least-loaded
  health_check_interval: 30s
  failover_enabled: true

servers:
  # Example servers (initially empty)
  # - id: server1
  #   host: example.com
  #   port: 443
  #   enabled: true
