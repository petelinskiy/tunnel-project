<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Alexei Morozov Photography</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <a href="/" class="logo">A · MOROZOV</a>
    <nav>
        <a href="/">Gallery</a>
        <a href="/about">About</a>
        <a href="/contact" class="active">Contact</a>
    </nav>
</header>

<main>
    <section class="contact-section">
        <h1>Let's work<br>together</h1>
        <p class="subtitle">
            Available for commercial projects, editorial assignments,
            and fine-art print commissions.
        </p>

        <form onsubmit="return false;">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="Project type or inquiry">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Tell me about your project..."></textarea>
            </div>

            <button type="submit" class="btn">Send Message</button>
        </form>

        <div class="contact-info">
            <div class="info-item">
                <div class="label">Email</div>
                <div class="value">
                    <a href="mailto:hello@morozov.photo">hello@morozov.photo</a>
                </div>
            </div>
            <div class="info-item">
                <div class="label">Location</div>
                <div class="value">Moscow · Worldwide</div>
            </div>
            <div class="info-item">
                <div class="label">Response time</div>
                <div class="value">Within 48 hours</div>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>© 2026 Alexei Morozov Photography &nbsp;·&nbsp; All rights reserved</p>
</footer>

</body>
</html>
